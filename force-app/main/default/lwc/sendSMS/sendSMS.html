<template>
    <div class="slds-modal__container">
        <header class="slds-modal__header">
            <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close"
                onclick={handleCancel}>
                <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse"
                    size="small"></lightning-icon>
            </button>
            <div class="slds-media slds-media_center">
                <div class="slds-media__figure">
                    <lightning-icon icon-name="utility:sms" size="small"></lightning-icon>
                </div>
                <div class="slds-media__body">
                    <h2 class="slds-text-heading_medium slds-hyphenate">Send SMS</h2>
                </div>
            </div>
        </header>

        <div class="slds-modal__content slds-p-around_medium">
            <lightning-pill-container label="To:" items={selectedRecipients} onitemremove={handleRemovePill}>
            </lightning-pill-container>

            <div class="slds-m-top_medium">
                <div class="slds-grid slds-grid_vertical-align-center">
                    <span class="slds-text-title_bold">Add a template</span>
                    <lightning-helptext content="Choose a template previously saved"></lightning-helptext>
                </div>
                <lightning-combobox name="template" variant="label-hidden" placeholder="Select"
                    options={templateOptions} onchange={handleTemplateChange}>
                </lightning-combobox>
            </div>

            <div class="slds-m-top_medium">
                <lightning-input type="text" label="Title" placeholder="Title" class="slds-m-bottom_small" value={title}
                    onchange={handleTitleChange}>
                </lightning-input>

                <lightning-input-rich-text placeholder="Write your message"
                    disabled-categories="INSERT_CONTENT, ALIGN_TEXT" value={messageBody} onchange={handleMessageChange}>
                </lightning-input-rich-text>
            </div>

            <div class="slds-m-top_medium slds-grid slds-grid_align-spread">
                <div>
                    <p class="slds-text-title_bold">Save as template</p>
                    <p class="slds-text-body_small">Keep this sms as a template for later</p>
                </div>
                <lightning-input type="toggle" label="Save as template" variant="label-hidden" checked={saveAsTemplate}
                    onchange={handleSaveTemplateChange}>
                </lightning-input>
            </div>
        </div>

        <footer class="slds-modal__footer">
            <button class="slds-button slds-button_neutral" onclick={handleCancel}>Cancel</button>
            <button class="slds-button slds-button_brand" onclick={handleSendMessage}>Send Message</button>
        </footer>
    </div>

</template>
